name: Build Desktop Store Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      submit:
        description: Submit the built .pkg to App Store Connect
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: desktop-store-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-store:
    name: Build macOS App Store package (.pkg)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .
    env:
      MAC_CODESIGN_CERT_P12_BASE64: ${{ secrets.MAC_CODESIGN_CERT_P12_BASE64 }}
      MAC_CODESIGN_CERT_PASSWORD: ${{ secrets.MAC_CODESIGN_CERT_PASSWORD }}
      MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
      MAC_INSTALLER_CERT_P12_BASE64: ${{ secrets.MAC_INSTALLER_CERT_P12_BASE64 }}
      MAC_INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
      MAC_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify required build secrets
        run: |
          set -euo pipefail
          for key in \
            MAC_CODESIGN_CERT_P12_BASE64 \
            MAC_CODESIGN_CERT_PASSWORD \
            MAC_INSTALLER_CERT_P12_BASE64 \
            MAC_INSTALLER_CERT_PASSWORD \
            MAC_APP_STORE_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!key:-}" ]; then
              echo "Missing secret: $key"
              exit 1
            fi
          done

      - name: Prepare certificate and provisioning profile
        run: |
          set -euo pipefail

          cert_path="$RUNNER_TEMP/mas-signing-cert.p12"
          installer_cert_path="$RUNNER_TEMP/mas-installer-cert.p12"
          profile_path="$RUNNER_TEMP/peardrop-mas.provisionprofile"

          echo "$MAC_CODESIGN_CERT_P12_BASE64" | base64 --decode > "$cert_path"
          echo "$MAC_INSTALLER_CERT_P12_BASE64" | base64 --decode > "$installer_cert_path"
          echo "$MAC_APP_STORE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"

          echo "CSC_LINK=$cert_path" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MAC_CODESIGN_CERT_PASSWORD" >> "$GITHUB_ENV"
          echo "CSC_NAME=3rd Party Mac Developer Application" >> "$GITHUB_ENV"
          echo "CSC_INSTALLER_LINK=$installer_cert_path" >> "$GITHUB_ENV"
          echo "CSC_INSTALLER_KEY_PASSWORD=$MAC_INSTALLER_CERT_PASSWORD" >> "$GITHUB_ENV"
          echo "CSC_INSTALLER_NAME=3rd Party Mac Developer Installer" >> "$GITHUB_ENV"
          echo "MAS_PROVISIONING_PROFILE=$profile_path" >> "$GITHUB_ENV"

          echo "Using dedicated installer certificate for .pkg signing."

      - name: Import certs into temporary keychain
        run: |
          set -euo pipefail

          keychain_path="$RUNNER_TEMP/build-signing.keychain-db"
          keychain_password="$(uuidgen)"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -s "$keychain_path"

          security import "$CSC_LINK" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security import "$CSC_INSTALLER_LINK" -P "$CSC_INSTALLER_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          echo "CSC_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
          echo "Using keychain: $keychain_path"

      - name: Validate certificate subjects
        run: |
          set -euo pipefail

          app_subject="$(
            openssl pkcs12 -in "$CSC_LINK" -clcerts -nokeys -passin "pass:$CSC_KEY_PASSWORD" 2>/dev/null \
              | openssl x509 -noout -subject 2>/dev/null || true
          )"
          installer_subject="$(
            openssl pkcs12 -in "$CSC_INSTALLER_LINK" -clcerts -nokeys -passin "pass:$CSC_INSTALLER_KEY_PASSWORD" 2>/dev/null \
              | openssl x509 -noout -subject 2>/dev/null || true
          )"

          echo "App cert subject: $app_subject"
          echo "Installer cert subject: $installer_subject"

          if [[ "$app_subject" != *"3rd Party Mac Developer Application"* ]]; then
            echo "MAC_CODESIGN_CERT_P12_BASE64 must contain a valid '3rd Party Mac Developer Application' certificate + private key."
            exit 1
          fi

          if [[ "$installer_subject" != *"3rd Party Mac Developer Installer"* ]]; then
            echo "MAC_INSTALLER_CERT_P12_BASE64 must contain a valid '3rd Party Mac Developer Installer' certificate + private key."
            exit 1
          fi

      - name: Validate certificate private keys
        run: |
          set -euo pipefail

          app_key_pem="$(openssl pkcs12 -legacy -in "$CSC_LINK" -nocerts -nodes -passin "pass:$CSC_KEY_PASSWORD" 2>/dev/null || true)"
          installer_key_pem="$(openssl pkcs12 -legacy -in "$CSC_INSTALLER_LINK" -nocerts -nodes -passin "pass:$CSC_INSTALLER_KEY_PASSWORD" 2>/dev/null || true)"

          if [[ "$app_key_pem" != *"PRIVATE KEY"* ]]; then
            echo "MAC_CODESIGN_CERT_P12_BASE64 does not contain a private key. Export from Keychain Access > My Certificates (not Certificates)."
            exit 1
          fi

          if [[ "$installer_key_pem" != *"PRIVATE KEY"* ]]; then
            echo "MAC_INSTALLER_CERT_P12_BASE64 does not contain a private key. Export from Keychain Access > My Certificates (not Certificates)."
            exit 1
          fi

      - name: Validate imported keychain identities
        run: |
          set -euo pipefail

          identity_dump="$(security find-identity -v -p codesigning "$CSC_KEYCHAIN" || true)"
          echo "$identity_dump"

          if ! grep -q "3rd Party Mac Developer Application" <<<"$identity_dump"; then
            echo "Keychain does not contain a usable '3rd Party Mac Developer Application' identity."
            exit 1
          fi

          if ! grep -q "3rd Party Mac Developer Installer" <<<"$identity_dump"; then
            echo "Keychain does not contain a usable '3rd Party Mac Developer Installer' identity."
            exit 1
          fi

      - name: Build MAS package
        run: npm run make:mas

      - name: Validate MAS-only package output
        run: |
          set -euo pipefail
          mapfile -t mas_pkgs < <(find out/make/mas-arm64 -type f -name '*.pkg' | sort)
          if [ "${#mas_pkgs[@]}" -ne 1 ]; then
            echo "Expected exactly one MAS .pkg in out/make/mas-arm64, found ${#mas_pkgs[@]}."
            find out/make -type f -name '*.pkg' -print || true
            exit 1
          fi

          mapfile -t all_pkgs < <(find out/make -type f -name '*.pkg' | sort)
          if [ "${#all_pkgs[@]}" -ne 1 ]; then
            echo "Expected only MAS package output, but found extra .pkg files:"
            printf '%s\n' "${all_pkgs[@]}"
            exit 1
          fi

      - name: Locate built .pkg
        run: |
          set -euo pipefail
          pkg="$(find out/make/mas-arm64 -type f -name '*.pkg' | head -n 1)"
          if [ -z "$pkg" ]; then
            echo "No .pkg produced for Mac App Store upload."
            exit 1
          fi
          echo "PKG_PATH=$pkg" >> "$GITHUB_ENV"
          echo "Built package: $pkg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-store-pkg
          path: ${{ env.PKG_PATH }}
          if-no-files-found: error

      - name: Submit to App Store Connect
        if: ${{ github.event_name == 'push' || inputs.submit }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          if [ -n "${ASC_API_KEY_ID:-}" ] && [ -n "${ASC_API_ISSUER_ID:-}" ] && [ -n "${ASC_API_KEY_P8_BASE64:-}" ]; then
            mkdir -p "$HOME/.appstoreconnect/private_keys"
            key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
            echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$key_path"
            chmod 600 "$key_path"

            xcrun altool --upload-app \
              --type macos \
              --file "$PKG_PATH" \
              --apiKey "$ASC_API_KEY_ID" \
              --apiIssuer "$ASC_API_ISSUER_ID" \
              --verbose
            exit 0
          fi

          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ]; then
            upload_args=(
              --upload-app
              --type macos
              --file "$PKG_PATH"
              --username "$APPLE_ID"
              --password "$APPLE_PASSWORD"
              --verbose
            )
            if [ -n "${APPLE_TEAM_ID:-}" ]; then
              upload_args+=(--asc-provider "$APPLE_TEAM_ID")
            fi
            xcrun altool "${upload_args[@]}"
            exit 0
          fi

          echo "Missing submit credentials. Provide either ASC_API_* secrets or APPLE_ID/APPLE_PASSWORD."
          exit 1
