name: Build Installers

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-installers:
    name: Windows Installers (.exe/.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Windows code-signing certificate
        if: ${{ secrets.WINDOWS_CODESIGN_CERT_P12_BASE64 != '' && secrets.WINDOWS_CODESIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_P12_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_P12_BASE64 }}
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows_codesign_cert.p12"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_P12_BASE64))
          "WINDOWS_CERTIFICATE_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_CERTIFICATE_PASSWORD=$env:WINDOWS_CODESIGN_CERT_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows artifacts
        run: npm run make:win32:squirrel

      - name: Normalize publish filenames
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $publishDir = "out/publish"
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

          $exe = Get-ChildItem -Path out -Recurse -Filter *.exe |
            Where-Object { $_.Name -notmatch "Update|Squirrel|Stub" } |
            Sort-Object Length -Descending |
            Select-Object -First 1
          if (-not $exe) { throw "No .exe installer found." }

          $msi = Get-ChildItem -Path out -Recurse -Filter *.msi |
            Sort-Object Length -Descending |
            Select-Object -First 1

          Copy-Item $exe.FullName "$publishDir/PearDrop-Setup-$version.exe" -Force
          Copy-Item $exe.FullName "$publishDir/PearDrop-Setup.exe" -Force
          if ($msi) {
            Copy-Item $msi.FullName "$publishDir/PearDrop-Setup-$version.msi" -Force
            Copy-Item $msi.FullName "$publishDir/PearDrop-Setup.msi" -Force
            Write-Host "MSI found and published."
          } else {
            Write-Host "No MSI found. Publishing EXE only."
          }

          Write-Host "Published artifacts:"
          Get-ChildItem $publishDir | ForEach-Object { Write-Host $_.FullName }

      - name: Verify Windows signatures
        if: ${{ secrets.WINDOWS_CODESIGN_CERT_P12_BASE64 != '' && secrets.WINDOWS_CODESIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path out/publish -File -Include *.exe,*.msi
          if (-not $files) { throw "No Windows installer artifacts found for signature verification." }
          foreach ($file in $files) {
            Write-Host "Verifying signature: $($file.FullName)"
            signtool verify /pa /v "$($file.FullName)"
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: out/publish/*
          if-no-files-found: error

  linux-installers:
    name: Linux Installer (.AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          chmod +x scripts/build-app-image.sh

      - name: Build Linux artifacts
        run: npm run make:linux

      - name: Normalize publish filenames
        run: |
          version=$(node -p "require('./package.json').version")
          publish_dir="out/publish"
          mkdir -p "$publish_dir"

          appimage="$(find out -type f -name '*.AppImage' | head -n 1)"
          if [ -z "$appimage" ]; then
            echo "No .AppImage found."
            exit 1
          fi

          chmod +x "$appimage"
          cp "$appimage" "$publish_dir/PearDrop-$version.AppImage"
          cp "$appimage" "$publish_dir/PearDrop.AppImage"
          chmod +x "$publish_dir/PearDrop-$version.AppImage" "$publish_dir/PearDrop.AppImage"

          echo "Published artifacts:"
          ls -la "$publish_dir"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: out/publish/*
          if-no-files-found: error

  macos-installers:
    name: macOS Installer (.dmg)
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Apple code-signing certificate
        env:
          MAC_CODESIGN_CERT_P12_BASE64: ${{ secrets.MAC_CODESIGN_CERT_P12_BASE64 }}
          MAC_CODESIGN_CERT_PASSWORD: ${{ secrets.MAC_CODESIGN_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${MAC_CODESIGN_CERT_P12_BASE64:-}" ]; then
            echo "Missing secret: MAC_CODESIGN_CERT_P12_BASE64"
            exit 1
          fi
          if [ -z "${MAC_CODESIGN_CERT_PASSWORD:-}" ]; then
            echo "Missing secret: MAC_CODESIGN_CERT_PASSWORD"
            exit 1
          fi

          cert_path="$RUNNER_TEMP/mac_codesign_cert.p12"
          keychain_path="$RUNNER_TEMP/pear-drop-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          echo "$MAC_CODESIGN_CERT_P12_BASE64" | base64 --decode > "$cert_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$MAC_CODESIGN_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"

          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build macOS artifacts
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          MAC_NOTARIZE_ON_PACKAGE: '0'
          DEBUG: electron-osx-sign*,electron-notarize*,@electron/osx-sign*,@electron/notarize*
        run: npm run make:darwin

      - name: Normalize publish filenames
        run: |
          version=$(node -p "require('./package.json').version")
          publish_dir="out/publish"
          mkdir -p "$publish_dir"

          dmg="$(find out -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "No .dmg found."
            exit 1
          fi

          cp "$dmg" "$publish_dir/PearDrop-$version.dmg"
          cp "$dmg" "$publish_dir/PearDrop.dmg"

          echo "Published artifacts:"
          ls -la "$publish_dir"

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          dmg="out/publish/PearDrop-$version.dmg"
          latest_dmg="out/publish/PearDrop.dmg"

          if [ ! -f "$dmg" ]; then
            echo "Missing DMG for notarization: $dmg"
            exit 1
          fi

          echo "Submitting DMG for notarization..."
          submit_json="$(xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json)"

          submission_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$submit_json")"
          if [ -z "$submission_id" ]; then
            echo "Could not read notarization submission id."
            echo "$submit_json"
            exit 1
          fi
          echo "Notarization submission id: $submission_id"

          for _ in $(seq 1 120); do
            info_json="$(xcrun notarytool info "$submission_id" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json)"
            status="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))' <<<"$info_json")"
            echo "Notarization status: $status"

            if [ "$status" = "Accepted" ]; then
              echo "Notarization accepted."
              xcrun stapler staple "$dmg"
              if [ -f "$latest_dmg" ]; then
                xcrun stapler staple "$latest_dmg" || true
              fi
              break
            fi

            if [ "$status" = "Invalid" ] || [ "$status" = "Rejected" ]; then
              echo "Notarization failed."
              xcrun notarytool log "$submission_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID"
              exit 1
            fi

            sleep 30
          done

          final_status="$(xcrun notarytool info "$submission_id" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')"
          if [ "$final_status" != "Accepted" ]; then
            echo "Timed out waiting for notarization (final status: $final_status)"
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: out/publish/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs:
      - windows-installers
      - linux-installers
      - macos-installers
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-installers'
          path: release-assets
          merge-multiple: true

      - name: Show collected assets
        run: ls -la release-assets

      - name: Upload installers to Railway downloads
        env:
          DOWNLOADS_UPLOAD_URL: ${{ secrets.DOWNLOADS_UPLOAD_URL }}
          DOWNLOADS_UPLOAD_TOKEN: ${{ secrets.DOWNLOADS_UPLOAD_TOKEN }}
          DOWNLOADS_OVERWRITE: ${{ vars.DOWNLOADS_OVERWRITE }}
        run: |
          set -euo pipefail

          if [ -z "${DOWNLOADS_UPLOAD_URL:-}" ]; then
            echo "Missing secret: DOWNLOADS_UPLOAD_URL"
            exit 1
          fi
          if [ -z "${DOWNLOADS_UPLOAD_TOKEN:-}" ]; then
            echo "Missing secret: DOWNLOADS_UPLOAD_TOKEN"
            exit 1
          fi

          version="$(ls -1 release-assets | sed -nE 's/^PearDrop-Setup-([0-9]+\.[0-9]+\.[0-9]+)\.exe$/\1/p' | head -n 1)"
          if [ -z "${version}" ]; then
            echo "Could not detect version from artifacts."
            exit 1
          fi

          upload() {
            src="$1"
            dst="$2"
            if [ ! -f "$src" ]; then
              echo "Skipping missing file: $src"
              return 0
            fi
            if [ "${DOWNLOADS_OVERWRITE:-0}" != "1" ]; then
              encoded_dst="${dst// /%20}"
              head_status="$(curl -s -o /dev/null -w "%{http_code}" "${DOWNLOADS_UPLOAD_URL}/downloads/${encoded_dst}")"
              if [ "$head_status" = "200" ]; then
                echo "Destination already exists, skipping upload: $dst"
                return 0
              fi
            fi
            echo "Uploading $src -> $dst"
            curl --fail --silent --show-error \
              --retry 5 \
              --retry-delay 2 \
              --retry-all-errors \
              -X PUT "${DOWNLOADS_UPLOAD_URL}/upload?path=${dst}" \
              -H "x-upload-token: ${DOWNLOADS_UPLOAD_TOKEN}" \
              --data-binary @"$src"
            echo "Uploaded $src -> $dst"
          }

          promote_latest() {
            src="$1"
            dst="$2"
            echo "Promoting $src -> $dst"
            curl --fail --silent --show-error \
              -X POST "${DOWNLOADS_UPLOAD_URL}/promote-latest" \
              -H "content-type: application/json" \
              -H "x-upload-token: ${DOWNLOADS_UPLOAD_TOKEN}" \
              --data "{\"source\":\"${src}\",\"target\":\"${dst}\"}"
            echo "Promoted $src -> $dst"
          }

          # Windows EXE only (required)
          upload "release-assets/PearDrop-Setup-${version}.exe" "win32/v${version}/PearDrop-Setup-${version}.exe"
          promote_latest "win32/v${version}/PearDrop-Setup-${version}.exe" "win32/latest/PearDrop-Setup.exe"

      - name: Move main-latest tag to current commit
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const ref = 'tags/main-latest'
            const sha = context.sha
            try {
              await github.rest.git.getRef({ owner, repo, ref })
              await github.rest.git.updateRef({ owner, repo, ref, sha, force: true })
              core.info(`Updated ${ref} -> ${sha}`)
            } catch (error) {
              if (error.status === 404) {
                await github.rest.git.createRef({ owner, repo, ref: `refs/${ref}`, sha })
                core.info(`Created refs/${ref} -> ${sha}`)
              } else {
                throw error
              }
            }

      - name: Publish rolling main release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          target_commitish: ${{ github.sha }}
          name: Pear Drop Latest
          prerelease: true
          fail_on_unmatched_files: false
          make_latest: false
          files: |
            release-assets/PearDrop-Setup.exe
            release-assets/PearDrop-Setup.msi
            release-assets/PearDrop.AppImage
            release-assets/PearDrop.dmg
            release-assets/PearDrop-Setup-*.exe
            release-assets/PearDrop-Setup-*.msi
            release-assets/PearDrop-*.AppImage
            release-assets/PearDrop-*.dmg

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            release-assets/PearDrop-Setup.exe
            release-assets/PearDrop-Setup.msi
            release-assets/PearDrop.AppImage
            release-assets/PearDrop.dmg
            release-assets/PearDrop-Setup-*.exe
            release-assets/PearDrop-Setup-*.msi
            release-assets/PearDrop-*.AppImage
            release-assets/PearDrop-*.dmg
