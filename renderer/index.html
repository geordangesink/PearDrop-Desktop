<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pear Drops</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121212;
        --bg-soft: #1a1a1a;
        --card: #161616;
        --line: #2a2a2a;
        --text: #f1f3f4;
        --muted: #a4a7ad;
        --brand: #2f7df6;
        --brand-soft: #171717;
        --star: #ffd25f;
      }
      body[data-theme='light'] {
        color-scheme: light;
        --bg: #f4f5f7;
        --bg-soft: #ffffff;
        --card: #ffffff;
        --line: #d8dce3;
        --text: #171a21;
        --muted: #5e6675;
        --brand: #2f7df6;
        --brand-soft: #ffffff;
        --star: #d4891f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: 'Avenir Next', 'SF Pro Text', 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .app {
        width: min(1360px, 96vw);
        height: min(900px, 94vh);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--bg-soft);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.34);
        overflow: auto;
        padding: 16px;
      }
      .hero {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        padding: 14px;
      }
      .mode-switch {
        display: flex;
        justify-content: center;
        margin: 4px 0 14px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
      }
      .tab-btn {
        border: 1px solid var(--line);
        background: #242424;
        color: var(--text);
        border-radius: 12px;
        min-width: 170px;
        padding: 12px 18px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .tab-btn.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
        box-shadow: 0 0 0 2px rgba(47, 125, 246, 0.22);
      }
      body[data-theme='light'] .tab-btn {
        background: #f3f5f9;
        border-color: #c8cfdb;
      }
      body[data-theme='light'] .tab-btn.active {
        background: var(--brand);
        color: #fff;
      }
      .tab-page {
        margin-top: 12px;
      }
      h1 {
        margin: 0;
        font-size: 30px;
      }
      .sub {
        margin: 6px 0 0;
        color: var(--muted);
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .input {
        flex: 1;
        min-width: 320px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #151515;
        color: var(--text);
        padding: 10px 12px;
      }
      body[data-theme='light'] .input {
        background: #fff;
      }
      .btn {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
        background: var(--brand);
        color: #fff;
      }
      .btn.alt {
        background: #242424;
        color: var(--text);
        border-color: var(--line);
      }
      .btn.warn {
        background: #311818;
        color: #ff9f9f;
        border-color: #6a2727;
      }
      body[data-theme='light'] .btn.alt {
        background: #f3f5f9;
        border-color: #c8cfdb;
      }
      body[data-theme='light'] .btn.warn {
        background: #fdeeee;
        color: #a53939;
        border-color: #e9b9b9;
      }
      .status {
        margin: 8px 0 0;
        color: var(--muted);
      }
      .worker-log {
        margin: 6px 0 0;
        color: #8fa3c7;
        font-size: 12px;
      }
      body[data-theme='light'] .worker-log {
        color: #5e6675;
      }
      .activity-bars {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }
      .activity-bar {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
      }
      .activity-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }
      .activity-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: #2a2d35;
        overflow: hidden;
      }
      body[data-theme='light'] .activity-track {
        background: #d9e0eb;
      }
      .activity-fill {
        height: 100%;
        width: 0%;
        background: var(--brand);
      }

      .layout {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 12px;
      }
      @media (max-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
      .right-col {
        display: grid;
        gap: 12px;
        align-content: start;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: var(--card);
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .panel-title {
        margin: 0;
        font-size: 18px;
      }
      .controls {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .source-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 8px;
      }
      .source-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: var(--brand-soft);
      }
      .source-card-main {
        display: grid;
        grid-template-columns: 84px 1fr auto;
        gap: 10px;
        align-items: start;
      }
      .source-preview {
        width: 84px;
        height: 84px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        overflow: hidden;
      }
      .source-preview-btn {
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }
      .source-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .source-select {
        margin-top: 2px;
      }
      body[data-theme='light'] .source-preview {
        background: #eef2f8;
      }
      .source-card.selected {
        outline: 2px solid var(--brand);
        outline-offset: -1px;
      }
      .source-name {
        font-weight: 600;
      }
      .source-path {
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
        word-break: break-all;
      }

      .rows {
        display: grid;
        gap: 8px;
      }
      .row-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 8px;
      }
      .row-title {
        font-weight: 600;
      }
      .row-sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
        word-break: break-all;
      }
      .star {
        color: var(--star);
      }

      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th,
      .table td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 8px 6px;
        vertical-align: middle;
      }
      .table th {
        color: var(--muted);
        font-size: 12px;
      }
      .small {
        color: var(--muted);
        font-size: 12px;
      }
      .muted-empty {
        color: var(--muted);
        font-size: 13px;
      }

      .menu-wrap {
        position: relative;
      }
      .menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        padding: 6px;
        z-index: 20;
        min-width: 140px;
      }
      .menu button {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        padding: 7px 8px;
        border-radius: 8px;
        cursor: pointer;
      }
      .menu button:hover {
        background: rgba(127, 127, 127, 0.14);
      }

      .shutdown-overlay {
        position: fixed;
        inset: 0;
        z-index: 3000;
        background: rgba(10, 11, 14, 0.96);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .shutdown-card {
        width: min(520px, 92vw);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        padding: 24px;
        text-align: center;
      }
      .shutdown-spinner {
        width: 30px;
        height: 30px;
        margin: 10px auto 0;
        border-radius: 999px;
        border: 3px solid rgba(127, 127, 127, 0.28);
        border-top-color: var(--brand);
        animation: spin 0.9s linear infinite;
      }
      .shutdown-title {
        margin: 0;
        font-size: 28px;
      }
      .shutdown-sub {
        margin: 8px 0 0;
        color: var(--muted);
      }
      .hidden {
        display: none !important;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="mode-switch">
        <div class="tabs">
          <button id="tab-upload" class="tab-btn active">Upload</button>
          <button id="tab-download" class="tab-btn">Download</button>
        </div>
      </div>

      <section id="upload-page" class="tab-page">
        <section class="hero">
          <p id="upload-status" class="status">Starting worker...</p>
          <p id="upload-worker-log" class="worker-log">Worker logs: waiting for events.</p>
          <div id="upload-worker-activity-bars" class="activity-bars hidden"></div>
        </section>

        <section class="layout">
          <article class="panel">
            <div class="panel-head">
              <h2 class="panel-title">Local Sources</h2>
              <div class="controls">
                <span class="menu-wrap">
                  <button id="source-add" class="btn">＋</button>
                  <div id="source-add-menu" class="menu hidden">
                    <button id="add-file-action">Add File(s)</button>
                    <button id="add-folder-action">Add Folder</button>
                  </div>
                </span>
                <button id="source-select-toggle" class="btn alt">Select All</button>
                <button id="source-remove-all" class="btn warn">Remove All</button>
                <button id="host-selected" class="btn">Host Selected</button>
              </div>
            </div>
            <div id="sources-grid" class="source-grid"></div>
          </article>

          <div class="right-col">
            <article class="panel">
              <div class="panel-head">
                <h2 class="panel-title">Active Hosts</h2>
                <div class="controls">
                  <button id="hosts-select-toggle" class="btn alt">Select All</button>
                  <button id="hosts-copy-selected" class="btn alt">Copy Selected</button>
                  <button id="hosts-star-selected" class="btn alt">Star Selected</button>
                  <button id="hosts-stop-selected" class="btn warn">Stop Selected</button>
                </div>
              </div>
              <div id="hosts-rows" class="rows"></div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <h2 class="panel-title">Starred Hosts</h2>
              </div>
              <div id="starred-rows" class="rows"></div>
            </article>
          </div>
        </section>

        <section class="panel" style="margin-top: 12px">
          <div class="panel-head">
            <h2 class="panel-title">Host History</h2>
            <div class="controls">
              <button id="history-select-toggle" class="btn alt">Select All</button>
              <button id="history-rehost-selected" class="btn">Re-host Selected</button>
              <button id="history-remove-selected" class="btn warn">Remove Selected</button>
            </div>
          </div>
          <div id="history-rows" class="rows"></div>
        </section>
      </section>

      <section id="download-page" class="tab-page hidden">
        <section class="hero">
          <div class="row">
            <input id="invite-input" class="input" placeholder="Paste peardrops://invite..." />
            <button id="view-drive" class="btn alt">View Drive</button>
          </div>

          <p id="download-status" class="status">Starting worker...</p>
          <p id="download-worker-log" class="worker-log">Worker logs: waiting for events.</p>
          <div id="download-worker-activity-bars" class="activity-bars hidden"></div>
        </section>

        <section style="margin-top: 12px">
          <article class="panel">
            <div class="panel-head">
              <h2 class="panel-title">Drive Files</h2>
              <div class="controls">
                <button id="download-selected" class="btn">Download Selected</button>
                <button id="drive-select-toggle" class="btn alt">Select All</button>
              </div>
            </div>
            <table class="table">
              <thead>
                <tr>
                  <th><input id="check-all-drive" type="checkbox" /></th>
                  <th>Name</th>
                  <th>Path</th>
                  <th>Size</th>
                </tr>
              </thead>
              <tbody id="drive-files"></tbody>
            </table>
          </article>
        </section>
      </section>

      <input id="file-picker" type="file" multiple class="hidden" />

      <section id="shutdown-overlay" class="shutdown-overlay hidden">
        <div class="shutdown-card">
          <h2 class="shutdown-title">Shutting Down</h2>
          <p id="shutdown-message" class="shutdown-sub">Closing Pear Drops safely</p>
          <div class="shutdown-spinner" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
